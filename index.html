    <h1>Type in key provided under QR code and then click ENTER</h1>
    <input type="password" id="password" />
    <div id="image"></div>

</body>
    <script>
        function convertWordArrayToUint8Array(wordArray) {
            var arrayOfWords = wordArray.hasOwnProperty("words") ? wordArray.words : [];
            var length = wordArray.hasOwnProperty("sigBytes") ? wordArray.sigBytes : arrayOfWords.length * 4;
            var uInt8Array = new Uint8Array(length), index=0, word, i;
            for (i=0; i<length; i++) {
                word = arrayOfWords[i];
                uInt8Array[index++] = word >> 24;
                uInt8Array[index++] = (word >> 16) & 0xff;
                uInt8Array[index++] = (word >> 8) & 0xff;
                uInt8Array[index++] = word & 0xff;
            }
            return uInt8Array;
        }

        const key = document.getElementById("password");
        key.focus()
        password.addEventListener('keypress', async (event) => {
            if (event.key === 'Enter') {
            const decrypted = await CryptoJS.AES.decrypt(document.getElementById("file-content").innerHTML, key.value);
            const decryptedData = convertWordArrayToUint8Array(decrypted)
            const url = URL.createObjectURL(new Blob([decryptedData.buffer], { type: 'image/png' }));
            const image = new Image();
            image.src = url
            image.style="max-width: 100%; height: auto;"
            key.style.display = 'none'
            if (decrypted.sigBytes === 251660) {
                document.getElementById("image").appendChild(image);
            } else {
                document.getElementById("image").innerHTML = "<b style='color:red;font-size: 3rem;'>Invalid key</b>";
            }
            }
        });
    </script>
